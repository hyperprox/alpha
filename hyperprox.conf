# =============================================================================
#  HyperProx — Nginx Internal Reverse Proxy
#  /opt/hyperprox/config/nginx/conf.d/hyperprox.conf
# =============================================================================

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream api {
    server api:3002;
    keepalive 32;
}

upstream setup {
    server setup:3001;
    keepalive 16;
}

upstream grafana {
    server grafana:3003;
    keepalive 16;
}

upstream prometheus {
    server prometheus:9090;
    keepalive 16;
}

# ---------------------------------------------------------------------------
#  Main server — HTTP (redirect to HTTPS if cert exists, serve direct if not)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Health check endpoint (used by Docker healthcheck)
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Setup wizard — served at /setup
    location /setup {
        proxy_pass         http://setup;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API
    location /api {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket — for real-time updates
    location /ws {
        proxy_pass          http://api;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Grafana
    location /grafana {
        proxy_pass         http://grafana;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Prometheus (internal access only — restrict in production)
    location /prometheus {
        proxy_pass         http://prometheus;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        allow              192.168.0.0/16;   # LAN only
        deny               all;
    }

    # Frontend — catch-all
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
