# HyperProx Docker Compose Stack
# Infrastructure services only ��� api/frontend/setup run as systemd units
# Do not add 'version:' ��� deprecated in Compose v2

services:
  postgres:
    image: postgres:16-alpine
    container_name: hyperprox-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hyperprox-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: hyperprox-prometheus
    restart: unless-stopped
    profiles: [monitoring]
    network_mode: host
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-90d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-40GB}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - ./config/prometheus/targets:/etc/prometheus/targets:ro
      - ./data/prometheus:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: hyperprox-grafana
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      - GF_SERVER_HTTP_PORT=3003
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SAMESITE=disabled
    volumes:
      - ./config/grafana:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3003:3003"
    networks:
      - hyperprox-net

  pve-exporter:
    image: prompve/prometheus-pve-exporter:latest
    container_name: hyperprox-pve-exporter
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - ./config/pve-exporter/pve.yml:/etc/prometheus/pve.yml:ro
    ports:
      - "127.0.0.1:9221:9221"
    networks:
      - hyperprox-net

  nginx:
    image: nginx:alpine
    container_name: hyperprox-nginx
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - hyperprox-net

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: hyperprox-npm
    restart: unless-stopped
    profiles: [npm]
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - hyperprox-net

networks:
  hyperprox-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  npm_data:
  npm_letsencrypt:
