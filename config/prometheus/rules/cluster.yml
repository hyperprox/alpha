groups:

  - name: node
    rules:

      - alert: NodeDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is down"
          description: "node_exporter on {{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: NodeHighCPU
        expr: 100 - (avg by(instance, node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.node }}"
          description: "CPU on {{ $labels.node }} has been above 90% for 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

      - alert: NodeHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.node }}"
          description: "Memory on {{ $labels.node }} is above 90% (current: {{ $value | printf \"%.1f\" }}%)."

      - alert: NodeDiskLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.node }}"
          description: "Root disk on {{ $labels.node }} has less than 10% free."

      - alert: NodeDiskCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk on {{ $labels.node }}"
          description: "Root disk on {{ $labels.node }} has less than 5% free."

  - name: ceph
    rules:

      - alert: CephHealthError
        expr: ceph_health_status == 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CEPH cluster is in ERROR state"

      - alert: CephHealthWarning
        expr: ceph_health_status == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CEPH cluster is in WARNING state"

      - alert: CephOSDDown
        expr: ceph_osd_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CEPH OSD {{ $labels.ceph_daemon }} is down"

      - alert: CephPoolHighUsage
        expr: (ceph_pool_stored / ceph_pool_max_avail) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CEPH pool {{ $labels.name }} is {{ $value | printf \"%.1f\" }}% full"

  - name: gpu
    rules:

      - alert: GPUHighTemperature
        expr: nvidia_smi_temperature_gpu > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature high on {{ $labels.node }}"
          description: "GPU on {{ $labels.node }} is {{ $value }}°C."

      - alert: GPUMemoryAlmostFull
        expr: (nvidia_smi_memory_used_bytes / nvidia_smi_memory_total_bytes) * 100 > 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU VRAM nearly full on {{ $labels.node }}"
